<!DOCTYPE html>
<html>

<head>

<title>IP Tracer Pro</title>

<meta name="viewport" content="width=device-width, initial-scale=1">


<style>

body{

margin:0;
background:#050505;
color:white;
font-family:Arial, sans-serif;
text-align:center;

}


.container{

max-width:600px;
margin:40px auto;
padding:20px;

}


h1{

color:#ff0033;
letter-spacing:3px;

}


p{

color:#aaa;

}



.card{

background:#111;
padding:20px;
border-radius:15px;
margin-top:20px;
box-shadow:0 0 20px #ff003333;

}



input{

width:80%;
padding:12px;
border-radius:8px;
border:none;
font-size:16px;

}



button{

margin:10px;
padding:12px 25px;
border:none;
border-radius:8px;
background:#ff0033;
color:#000;
font-weight:bold;
cursor:pointer;

}



button:hover{

background:#cc0029;

}



.status{

color:#ff0033;
font-weight:bold;

}



.scan-line{

width:100%;
height:3px;
background:#ff0033;
margin-top:15px;
box-shadow:0 0 15px #ff0033;

animation:scan 1.5s infinite;

}



@keyframes scan{

0%{

transform:translateX(-100%);

}


100%{

transform:translateX(100%);

}

}



.info-section{

margin-top:15px;
padding:15px;
background:#0b0b0b;
border-left:3px solid #ff0033;
border-radius:10px;
text-align:left;

}



.info-title{

color:#ff0033;
font-weight:bold;
letter-spacing:2px;
margin-bottom:10px;

}



.info-line{

padding:5px 0;

}



.fade{

animation:fadeIn .8s;

}



@keyframes fadeIn{

from{

opacity:0;
transform:translateY(10px);

}


to{

opacity:1;
transform:translateY(0);

}

}


</style>


</head>



<body>



<div class="container">



<h1>IP TRACER PRO</h1>

<p>Network Information Dashboard</p>




<div class="card">


<input id="ip" placeholder="Enter IP Address">


<br>


<button onclick="traceIP()">
TRACE
</button>


<button onclick="myIP()">
MY IP
</button>


</div>





<div class="card" id="result">


<div class="status">

READY

</div>


<div class="scan-line"></div>


<br>


Waiting for scan...


</div>





</div>






<script>



async function traceIP(ip=null){



let result=document.getElementById("result");



if(!ip){

ip=document.getElementById("ip").value;

}



result.innerHTML=`

<div class="status" id="scanStatus">
INITIALISING SCANNER...
</div>

<div class="scan-line"></div>

<br>

<div id="scanLog">
Preparing connection...
</div>

`;


await new Promise(resolve => setTimeout(resolve, 800));

document.getElementById("scanStatus").innerHTML =
"CONNECTING TO DATABASE...";

document.getElementById("scanLog").innerHTML =
"✓ Connection established";


await new Promise(resolve => setTimeout(resolve, 800));

document.getElementById("scanStatus").innerHTML =
"ANALYSING IP...";

document.getElementById("scanLog").innerHTML =
"✓ IP detected";


await new Promise(resolve => setTimeout(resolve, 800));

document.getElementById("scanStatus").innerHTML =
"FETCHING NETWORK DATA...";

document.getElementById("scanLog").innerHTML =
"✓ Data received";


await new Promise(resolve => setTimeout(resolve, 800));
try{



let response = await fetch(

"https://ipapi.co/"+ip+"/json/"

);



let data = await response.json();





result.innerHTML=`

<div class="fade">


<div class="info-section">

<div class="info-title">
SYSTEM STATUS
</div>

<div class="info-line">
● ONLINE
</div>

<div class="info-line">
Scan complete
</div>

</div>



<div class="info-section">

<div class="info-title">
PUBLIC IP
</div>

<div class="info-line">
${data.ip}
</div>

</div>



<div class="info-section">

<div class="info-title">
LOCATION DATA
</div>

<div class="info-line">
🌍 Country: ${data.country_name}
</div>

<div class="info-line">
🏙 City: ${data.city}
</div>

<div class="info-line">
Region: ${data.region}
</div>

<div class="info-line">
Timezone: ${data.timezone}
</div>

</div>




<div class="info-section">

<div class="info-title">
NETWORK DATA
</div>

<div class="info-line">
ISP: ${data.org}
</div>

<div class="info-line">
ASN: ${data.asn}
</div>

</div>


</div>

`;


result.innerHTML=

"Error finding IP information.";


}



}







async function myIP(){



try{



let response = await fetch(

"https://api.ipify.org?format=json"

);



let data = await response.json();



traceIP(data.ip);



}



catch{


alert("Could not detect IP");


}



}




</script>




</body>

</html>

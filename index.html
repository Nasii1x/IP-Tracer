<!DOCTYPE html>
<html>

<head>

<title>IP Tracer Pro</title>

<meta name="viewport" content="width=device-width, initial-scale=1">


<style>
.logo{

color:#ff0033;
font-family:monospace;
font-size:22px;
font-weight:bold;
letter-spacing:2px;
margin-bottom:15px;
text-shadow:0 0 10px #ff0033;

}

color:#ff0033;
font-family:monospace;
font-size:28px;
font-weight:bold;
letter-spacing:3px;
margin-bottom:15px;
text-shadow:0 0 10px #ff0033;

}
body{

margin:0;
background:#000000;
color:white;
font-family:Arial, sans-serif;
text-align:center;

}


.container{

max-width:600px;
margin:40px auto;
padding:20px;

}


h1{

color:#ff0033;
letter-spacing:3px;

}


p{

color:#aaa;

}



.input-section{

margin-top:20px;

}



input{

width:80%;
padding:12px;
border-radius:8px;
border:none;
font-size:16px;

}



button{

margin:10px;
padding:12px 25px;
border:none;
border-radius:8px;
background:#ff0033;
color:#000;
font-weight:bold;
cursor:pointer;

}



button:hover{

background:#cc0029;

}



.status{

color:#ff0033;
font-weight:bold;
margin-top:30px;

}



.scan-line{

width:100%;
height:3px;
background:#ff0033;
margin-top:15px;
box-shadow:0 0 15px #ff0033;

animation:scan 1.5s infinite;

}



@keyframes scan{

0%{

transform:translateX(-100%);

}


100%{

transform:translateX(100%);

}

}



.info-line{

padding:10px 0;
color: white;
font-size:16px;

}



.fade{

animation:fadeIn .8s;

}



@keyframes fadeIn{

from{

opacity:0;
transform:translateY(10px);

}


to{

opacity:1;
transform:translateY(0);

}

}

.result-section{

margin-top:30px;

}


</style>


</head>



<body>



<div class="container">


<div class="logo">
root@Nas:~$
</div>

<h1>IP TRACER PRO</h1>

<p>Network Information Dashboard</p>




<div class="input-section">

<input id="ip" placeholder="Enter IP Address">

<br>

<button onclick="traceIP()">
TRACE
</button>

<button onclick="myIP()">
MY IP
</button>

</div>




<div class="result-section" id="result">


<div class="status">

READY

</div>


<div class="scan-line"></div>


<br>

Waiting for scan...

</div>




</div>




<script>

async function traceIP(ip=null){

let result=document.getElementById("result");

if(!ip){
ip=document.getElementById("ip").value;
}

result.innerHTML=`
<div class="status" id="scanStatus">
INITIALISING SCANNER...
</div>

<div class="scan-line"></div>

<br>

<div id="scanLog">
Preparing connection...
</div>

`;

await new Promise(resolve => setTimeout(resolve, 800));

document.getElementById("scanStatus").innerHTML =
"CONNECTING TO DATABASE...";

document.getElementById("scanLog").innerHTML =
"✓ Connection established";

await new Promise(resolve => setTimeout(resolve, 800));

document.getElementById("scanStatus").innerHTML =
"ANALYSING IP...";

document.getElementById("scanLog").innerHTML =
"✓ IP detected";

await new Promise(resolve => setTimeout(resolve, 800));

document.getElementById("scanStatus").innerHTML =
"FETCHING NETWORK DATA...";

document.getElementById("scanLog").innerHTML =
"✓ Data received";

await new Promise(resolve => setTimeout(resolve, 800));
try{

let response = await fetch(
"https://ipapi.co/"+ip+"/json/"
);

let data = await response.json();

result.innerHTML=`
<div class="fade">

<div class="status">
✓ SCAN COMPLETE
</div>

<div class="scan-line"></div>

<div class="info-line">
<br>
IP: ${data.ip}
</div>

<div class="info-line">
Country: ${data.country_name}
</div>

<div class="info-line">
City: ${data.city}
</div>

<div class="info-line">
Region: ${data.region}
</div>

<div class="info-line">
Timezone: ${data.timezone}
</div>

<div class="info-line">
ISP: ${data.org}
</div>

<div class="info-line">
Latitude: ${data.latitude}
</div>

<div class="info-line">
Longitude: ${data.longitude}
</div>

</div>
`;

}catch(error){
result.innerHTML="<div class='status'>✗ ERROR</div><div class='scan-line'></div><br>Error finding IP information.";
console.log(error);
}

}

async function myIP(){

try{

let response = await fetch(
"https://api.ipify.org?format=json"
);

let data = await response.json();

traceIP(data.ip);

}

catch(error){

alert("Could not detect IP");
console.log(error);

}

}

</script>




</body>

</html>

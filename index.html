<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<title>IP Tracer</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body {
    margin:0;
    background:#050505;
    color:white;
    font-family:Arial, sans-serif;
    text-align:center;
}

.container {
    max-width:500px;
    margin:50px auto;
    padding:20px;
}

h1 {
    color:#ff0033;
    letter-spacing:2px;
}

.box {
    background:#111;
    padding:20px;
    border-radius:15px;
    margin-top:20px;
    box-shadow:0 0 20px #ff003333;
}

input {
    width:80%;
    padding:12px;
    border-radius:8px;
    border:none;
    margin:10px;
    font-size:16px;
}

button{
margin:10px;
padding:12px 20px;
border:0;
border-radius:8px;
background:#ff0033;
color:#000;
font-weight:bold;
cursor:pointer;
}
}

button:hover {
    background:#cc0029;
}

.result {
    text-align:left;
    line-height:1.8;
}
.scan-line {
    width:100%;
    height:3px;
    background:#ff0033;
    animation:scan 1.5s infinite;
    margin-top:15px;
    box-shadow:0 0 15px #ff0033;
}

@keyframes scan {

0% {
    transform:translateX(-100%);
}

100% {
    transform:translateX(100%);
}

}

.status {
    color:#ff0033;
    font-weight:bold;
    margin-top:15px;
}
.info-section{
    margin-top:15px;
    padding:15px;
    background:#0b0b0b;
    border-left:3px solid #ff0033;
    border-radius:10px;
}

.info-title{
    color:#ff0033;
    font-weight:bold;
    letter-spacing:2px;
    margin-bottom:10px;
}

.info-line{
    padding:5px 0;
    color:white;
}

.fade{
    animation:fadeIn 0.8s;
}

@keyframes fadeIn{

from{
    opacity:0;
    transform:translateY(10px);
}

to{
    opacity:1;
    transform:translateY(0);
}

}
</style>
#map{

height:300px;

width:100%;

border-radius:12px;

margin-top:15px;

border:2px solid #ff0033;

}

.leaflet-container{

background:#050505;

}

</head>

<body>

<div class="container">

<h1>IP TRACER</h1>

<p>Network information lookup</p>


<div class="box">

<input id="ip" placeholder="Enter IP (example: 8.8.8.8)">

<br>

<button onclick="traceIP()">TRACE</button>

</div>


<div class="card result" id="result">
    <div class="card">

<div class="info-title">
MAP LOCATION
</div>

<div id="map"></div>

</div>

<div class="status">
READY
</div>

<div class="scan-line"></div>

<br>

Waiting for scan...

</div>


</div>


<script>

async function traceIP(){

let ip = document.getElementById("ip").value;

let result = document.getElementById("result");

result.innerHTML=`

<div class="status">
SCANNING...
</div>

<div class="scan-line"></div>

<br>

Analysing IP information...

`;


try {

let response = await fetch(
"https://ipapi.co/" + ip + "/json/"
);


let data = await response.json();
let map = L.map('map').setView(
[data.latitude, data.longitude],
5
);


L.tileLayer(
'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:18
}
).addTo(map);


L.marker(
[data.latitude,data.longitude]
)
.addTo(map)
.bindPopup(
"Approximate IP Location"
)
.openPopup();


result.innerHTML=`

<div class="fade">

<div class="info-section">

<div class="info-title">
IP INFORMATION
</div>

<div class="info-line">
IP Address: ${data.ip}
</div>

</div>


<div class="info-section">

<div class="info-title">
LOCATION DATA
</div>

<div class="info-line">
Country: ${data.country_name}
</div>

<div class="info-line">
Region: ${data.region}
</div>

<div class="info-line">
City: ${data.city}
</div>

<div class="info-line">
Timezone: ${data.timezone}
</div>

</div>



<div class="info-section">

<div class="info-title">
NETWORK DATA
</div>

<div class="info-line">
ISP: ${data.org}
</div>

<div class="info-line">
ASN: ${data.asn}
</div>

</div>


<div class="info-section">

<div class="info-title">
STATUS
</div>

<div class="info-line">
Connection: ACTIVE ✅
</div>

</div>


</div>

`;

}

catch {

result.innerHTML="Error finding IP information.";

}

}

</script>


</body>
</html>
